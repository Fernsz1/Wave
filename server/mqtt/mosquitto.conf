# Wave broker — LAN only, no internet required. (Reused from wave_demo.)
# Run with:  mosquitto -c server/mqtt/mosquitto.conf -v

# Plain MQTT over TCP — used by the Django server (paho-mqtt) and CLI tools.
listener 1883 0.0.0.0
protocol mqtt

# MQTT over WebSockets — required by the browser app (mqtt.js).
listener 9001 0.0.0.0
protocol websockets

# Demo only: no auth. Do NOT use allow_anonymous in production.
allow_anonymous true

# Optional: persist retained messages across broker restarts (LoRa-style
# "delivered when reachable"). Uncomment and ensure the dir exists/writable.
# persistence true
# persistence_location ./mosquitto-data/
